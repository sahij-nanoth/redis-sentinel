port 26379
bind 0.0.0.0
protected-mode no

logfile ""
dir /tmp

sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Patched dynamically by entrypoint if required
sentinel monitor mymaster redis-0.redis-headless.redis-sentinel.svc.cluster.local 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000
sentinel parallel-syncs mymaster 1
