apiVersion: batch/v1
kind: Job
metadata:
  name: redis-validate
  namespace: redis-sentinel
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: validate
          image: redis:7.2
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Checking sentinel master discovery"
              redis-cli -h sentinel -p 26379 SENTINEL get-master-addr-by-name mymaster
              echo "Writing test key through stable proxy"
              redis-cli -h redis-proxy -p 6379 SET xyz hello
              echo "Reading test key through stable proxy"
              redis-cli -h redis-proxy -p 6379 GET xyz
              echo "Replication info through stable proxy"
              redis-cli -h redis-proxy -p 6379 INFO replication
