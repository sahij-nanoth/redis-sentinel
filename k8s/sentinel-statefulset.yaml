apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sentinel
  namespace: redis-sentinel
spec:
  serviceName: sentinel-headless
  replicas: 3
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
    spec:
      serviceAccountName: default
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sentinel
          image: your-registry/redis-sentinel-rhel8:7.2
          imagePullPolicy: IfNotPresent
          command: ["/opt/redis/scripts/entrypoint.sh", "sentinel"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MASTER_NAME
              value: mymaster
            - name: MASTER_HOST
              value: redis-0.redis-headless.redis-sentinel.svc.cluster.local
            - name: MASTER_PORT
              value: "6379"
            - name: SENTINEL_QUORUM
              value: "2"
          ports:
            - containerPort: 26379
              name: sentinel
          volumeMounts:
            - name: redis-config
              mountPath: /opt/redis/conf/redis.conf
              subPath: redis.conf
            - name: sentinel-config
              mountPath: /opt/redis/conf/sentinel.conf
              subPath: sentinel.conf
          readinessProbe:
            tcpSocket:
              port: 26379
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 26379
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf
        - name: sentinel-config
          configMap:
            name: redis-config
            items:
              - key: sentinel.conf
                path: sentinel.conf
